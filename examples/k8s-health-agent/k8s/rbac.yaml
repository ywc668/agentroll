# ServiceAccount, Role, and RoleBinding for the K8s Health Check Agent.
# The agent needs read-only access to pods, deployments, events, and logs
# in the default namespace to answer health queries.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-health-agent
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-health-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-health-agent
subjects:
  - kind: ServiceAccount
    name: k8s-health-agent
    namespace: default
roleRef:
  kind: ClusterRole
  name: k8s-health-agent
  apiGroup: rbac.authorization.k8s.io
