                            fieldRef:
                              description: |-
                                Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                              properties:
                                apiVersion:
                                  description: Version of the schema the FieldPath
                                    is written in terms of, defaults to "v1".
                                  type: string
                                fieldPath:
                                  description: Path of the field to select in the
                                    specified API version.
                                  type: string
                              required:
                              - fieldPath
                              type: object
                              x-kubernetes-map-type: atomic
                            fileKeyRef:
                              description: |-
                                FileKeyRef selects a key of the env file.
                                Requires the EnvFiles feature gate to be enabled.
                              properties:
                                key:
                                  description: |-
                                    The key within the env file. An invalid key will prevent the pod from starting.
                                    The keys defined within a source may consist of any printable ASCII characters except '='.
                                    During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                  type: string
                                optional:
                                  default: false
                                  description: |-
                                    Specify whether the file or its key must be defined. If the file or key
                                    does not exist, then the env var is not published.
                                    If optional is set to true and the specified key does not exist,
                                    the environment variable will not be set in the Pod's containers.

                                    If optional is set to false and the specified key does not exist,
                                    an error will be returned during Pod creation.
                                  type: boolean
                                path:
                                  description: |-
                                    The path within the volume from which to select the file.
                                    Must be relative and may not contain the '..' path or start with '..'.
                                  type: string
                                volumeName:
                                  description: The name of the volume mount containing
                                    the env file.
                                  type: string
                              required:
                              - key
                              - path
                              - volumeName
                              type: object
                              x-kubernetes-map-type: atomic
                            resourceFieldRef:
                              description: |-
                                Selects a resource of the container: only resources limits and requests
                                (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                              properties:
                                containerName:
                                  description: 'Container name: required for volumes,
                                    optional for env vars'
                                  type: string
                                divisor:
                                  anyOf:
                                  - type: integer
                                  - type: string
                                  description: Specifies the output format of the
                                    exposed resources, defaults to "1"
                                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                  x-kubernetes-int-or-string: true
                                resource:
                                  description: 'Required: resource to select'
                                  type: string
                              required:
                              - resource
                              type: object
                              x-kubernetes-map-type: atomic
                            secretKeyRef:
                              description: Selects a key of a secret in the pod's
                                namespace
                              properties:
                                key:
                                  description: The key of the secret to select from.  Must
                                    be a valid secret key.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the Secret or its key
                                    must be defined
                                  type: boolean
                              required:
                              - key
                              type: object
                              x-kubernetes-map-type: atomic
                          type: object
                      required:
                      - name
                      type: object
                    type: array
                  image:
                    description: Image is the container image for the agent.
                    type: string
                  ports:
                    description: Ports defines the ports exposed by the agent container.
                    items:
                      description: ContainerPort represents a network port in a single
                        container.
                      properties:
                        containerPort:
                          description: |-
                            Number of port to expose on the pod's IP address.
                            This must be a valid port number, 0 < x < 65536.
                          format: int32
                          type: integer
                        hostIP:
                          description: What host IP to bind the external port to.
                          type: string
                        hostPort:
                          description: |-
                            Number of port to expose on the host.
                            If specified, this must be a valid port number, 0 < x < 65536.
                            If HostNetwork is specified, this must match ContainerPort.
                            Most containers do not need this.
                          format: int32
                          type: integer
                        name:
                          description: |-
                            If specified, this must be an IANA_SVC_NAME and unique within the pod. Each
                            named port in a pod must have a unique name. Name for the port that can be
                            referred to by services.
                          type: string
                        protocol:
                          default: TCP
                          description: |-
                            Protocol for port. Must be UDP, TCP, or SCTP.
                            Defaults to "TCP".
                          type: string
                      required:
                      - containerPort
                      type: object
                    type: array
                  resources:
                    description: Resources defines compute resource requirements.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                required:
                - image
                type: object
              dependsOn:
                description: |-
                  DependsOn lists names of other AgentDeployments (in the same namespace) that
                  must be in Stable phase before this agent's canary is allowed to progress.
                  Use this for A2A (agent-to-agent) coordination: if agent B calls agent A,
                  declare A in B's DependsOn so a degraded A blocks B's canary promotion.
                items:
                  type: string
                type: array
              evolution:
                description: |-
                  Evolution configures the self-evolution loop for this agent.
                  When enabled, the controller analyses canary outcomes and proposes or applies
                  improvements: threshold tuning, prompt optimisation, or model version bumps.
                  Disabled by default — opt in explicitly.
                properties:
                  consecutiveCanariesForPlateau:
                    default: 3
                    description: |-
                      ConsecutiveCanariesForPlateau is the number of consecutive successful canaries
                      with no quality improvement that triggers the model-upgrader strategy.
                    format: int32
                    minimum: 2
                    type: integer
                  enabled:
                    default: false
                    description: |-
                      Enabled controls whether the self-evolution loop is active.
                      Set to true to opt in; all other fields are ignored when false.
                    type: boolean
                  humanApproval:
                    description: |-
                      HumanApproval configures human-in-the-loop review via GitHub PRs.
                      When set, proposed improvements are opened as pull requests rather than
                      applied directly.
                    properties:
                      github:
                        description: GitHub configures pull request creation for human
                          review.
                        properties:
                          baseBranch:
                            default: main
                            description: BaseBranch is the target branch for pull
                              requests.
                            type: string
                          owner:
                            description: Owner is the GitHub user or organisation
                              that owns the repository.
                            type: string
                          repo:
                            description: Repo is the repository name (without the
                              owner prefix).
                            type: string
                          secretRef:
                            description: |-
                              SecretRef is the name of a Kubernetes Secret containing the GitHub token.
                              Expected key: GITHUB_TOKEN. Token must have contents:write and pull_requests:write.
                            type: string
                        required:
                        - owner
                        - repo
                        - secretRef
                        type: object
                    type: object
                  optimizer:
                    description: |-
                      Optimizer holds LLM connection details used by the prompt-optimizer and
                      model-upgrader strategies. Required when strategy is "prompt-optimizer",
                      "model-upgrader", or "all".
                    properties:
                      model:
                        description: Model is the LLM model identifier (e.g., "claude-sonnet-4-20250514",
                          "gpt-4o").
                        type: string
                      provider:
                        default: anthropic
                        description: Provider identifies the LLM API provider.
                        enum:
                        - anthropic
                        - openai
                        type: string
                      secretRef:
                        description: |-
                          SecretRef is the name of a Kubernetes Secret in the same namespace containing
                          the provider API key. Expected key: API_KEY.
                        type: string
                    required:
                    - model
                    - secretRef
                    type: object
                  promptConfigMap:
                    description: |-
                      PromptConfigMap is the name of a ConfigMap (in the same namespace) that
                      holds versioned system prompts. Expected key: "system_prompt".

                      When set, the prompt-optimizer strategy writes its improved prompt directly
                      to this ConfigMap (key: "system_prompt") instead of — or in addition to —
                      opening a GitHub PR. The controller then injects a SYSTEM_PROMPT env var
                      into the agent container sourced from this ConfigMap, so the next pod
                      restart picks up the new prompt without a new image build.

                      When humanApproval is also configured, the PR is opened AND the ConfigMap
                      is NOT updated automatically (human review required first).
                    type: string
                  schedule:
                    description: |-
                      Schedule is a cron expression that controls how often the evolution loop fires
                      when trigger is "periodic" or "both" (e.g., "0 2 * * *" for daily at 02:00 UTC).
                      Required when trigger is "periodic" or "both"; ignored for "on-canary-fail".
                    type: string
                  strategy:
                    default: all
                    description: |-
                      Strategy selects which evolution strategies to run.

                      threshold-tuner  — adjusts quality-gate thresholds from historical AnalysisRun
                                         outcomes without calling an LLM.
                      prompt-optimizer — reads failing Langfuse traces, calls an LLM, and opens a
                                         GitHub PR with suggested prompt rewrites.
                      model-upgrader   — proposes a model version bump when quality plateaus across
                                         N consecutive canaries.
                      all              — runs all three strategies in order.
                    enum:
                    - threshold-tuner
                    - prompt-optimizer
                    - model-upgrader
                    - all
                    type: string
                  trigger:
                    default: on-canary-fail
                    description: |-
                      Trigger determines when the evolution loop fires.

                      on-canary-fail — fires immediately after a canary is aborted by a failed AnalysisRun.
                      periodic       — fires on a fixed schedule regardless of rollout outcome.
                      both           — fires on canary failure AND on the periodic schedule.
                    enum:
                    - on-canary-fail
                    - periodic
                    - both
                    type: string
                required:
                - enabled
                type: object
              observability:
                description: Observability configures agent-specific monitoring and
                  tracing.
                properties:
                  langfuse:
                    description: |-
                      Langfuse configures integration with Langfuse for agent trace data.
                      Langfuse traces are used as data sources for canary analysis.
                    properties:
                      endpoint:
                        description: Endpoint is the Langfuse server URL.
                        type: string
                      projectId:
                        description: ProjectID identifies the Langfuse project for
                          this agent.
                        type: string
                      secretRef:
                        description: |-
                          SecretRef references a Kubernetes Secret containing the Langfuse API keys.
                          Expected keys: LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY
                        type: string
                    required:
                    - endpoint
                    type: object
                  opentelemetry:
                    description: OpenTelemetry enables auto-injection of an OTel sidecar.
                    properties:
                      collectorEndpoint:
                        description: CollectorEndpoint overrides the default OTel
                          collector endpoint.
                        type: string
                      enabled:
                        default: false
                        description: Enabled controls whether an OTel collector sidecar
                          is injected.
                        type: boolean
                    required:
                    - enabled
                    type: object
                type: object
              replicas:
                default: 1
                description: |-
                  Replicas is the desired number of agent pod replicas.
                  Ignored if Scaling is configured.
                format: int32
                type: integer
              rollback:
                description: Rollback defines automatic rollback conditions.
                properties:
                  onCostSpike:
                    description: |-
                      OnCostSpike triggers rollback when token cost exceeds the threshold
                      relative to the stable version's baseline.
                    properties:
                      threshold:
                        description: |-
                          Threshold is the percentage above baseline that triggers rollback.
                          e.g., "200%" means rollback if cost exceeds 2x the stable version.
                        type: string
                    required:
                    - threshold
                    type: object
                  onFailedAnalysis:
                    default: true
                    description: OnFailedAnalysis triggers rollback when any analysis
                      step fails.
                    type: boolean
                required:
                - onFailedAnalysis
                type: object
              rollout:
                description: |-
                  Rollout defines the progressive delivery strategy.
                  Built on top of Argo Rollouts — not reinventing the wheel.
                properties:
                  steps:
                    description: |-
                      Steps defines the canary progression steps.
                      Each step can specify a traffic weight and an optional analysis check.
                    items:
                      description: RolloutStep defines a single step in the canary
                        progression.
                      properties:
                        analysis:
                          description: |-
                            Analysis references an AnalysisTemplate to run at this step.
                            If the analysis fails, the rollout is aborted and rolled back.
                          properties:
                            templateRef:
                              description: |-
                                TemplateRef is the name of the AnalysisTemplate to use.
                                AgentRoll ships with pre-built templates: agent-quality-check,
                                agent-cost-check, agent-tool-success-rate, etc.
                              type: string
                          required:
                          - templateRef
                          type: object
                        pause:
                          description: Pause defines how long to wait at this step
                            before proceeding.
                          properties:
                            duration:
                              description: Duration is how long to pause (e.g., "5m",
                                "1h").
                              type: string
                          type: object
                        setWeight:
                          description: SetWeight sets the percentage of traffic routed
                            to the canary.
                          format: int32
                          maximum: 100
                          minimum: 0
                          type: integer
                      required:
                      - setWeight
                      type: object
                    type: array
                  strategy:
                    default: canary
                    description: 'Strategy is the rollout strategy: "canary" or "blueGreen".'
                    enum:
                    - canary
                    - blueGreen
                    type: string
                required:
                - strategy
                type: object
              scaling:
                description: |-
                  Scaling defines autoscaling behavior.
                  Defaults to queue-depth based scaling (not CPU — agents are I/O bound).
                properties:
                  maxReplicas:
                    description: MaxReplicas is the maximum number of agent pod replicas.
                    format: int32
                    minimum: 1
                    type: integer
                  metric:
                    default: queue-depth
                    description: |-
                      Metric is the scaling metric: "queue-depth" (recommended for agents),
                      "cpu", "memory", or "custom".
                      Agents are typically I/O bound (waiting for LLM API responses),
                      so CPU-based scaling is ineffective. Use queue-depth instead.
                    enum:
                    - queue-depth
                    - cpu
                    - memory
                    - custom
                    type: string
                  minReplicas:
                    default: 1
                    description: MinReplicas is the minimum number of agent pod replicas.
                    format: int32
                    minimum: 0
                    type: integer
                  queueRef:
                    description: QueueRef identifies the queue to monitor for queue-depth
                      scaling.
                    properties:
                      address:
                        description: Address is the queue service address.
                        type: string
                      provider:
                        description: 'Provider is the queue backend: "redis", "rabbitmq",
                          "sqs".'
                        type: string
                      queueName:
                        description: QueueName is the specific queue/topic to monitor.
                        type: string
                    required:
                    - address
                    - provider
                    - queueName
                    type: object
                  targetValue:
                    default: 5
                    description: |-
                      TargetValue is the per-pod target for the scaling metric.
                      For queue-depth: number of pending tasks per pod.
                      For cpu/memory: percentage utilization.
                    format: int32
                    type: integer
                required:
                - maxReplicas
                - metric
                - minReplicas
                - targetValue
                type: object
              serviceAccountName:
                description: |-
                  ServiceAccountName is the Kubernetes ServiceAccount for the agent pods.
                  Agents often need specific RBAC permissions (e.g., read cluster resources).
                  If not set, the default ServiceAccount of the namespace is used.
                type: string
            required:
            - container
            - rollout
            type: object
          status:
            description: AgentDeploymentStatus defines the observed state of an AgentDeployment.
            properties:
              canaryVersion:
                description: CanaryVersion is the version currently being tested via
                  canary.
                type: string
              canaryWeight:
                description: CanaryWeight is the current percentage of traffic going
                  to the canary.
                format: int32
                type: integer
              conditions:
                description: Conditions represent the latest observations of the deployment's
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              evolution:
                description: |-
                  Evolution reflects the current state of the self-evolution loop.
                  Populated only after the evolution controller has completed at least one evaluation.
                properties:
                  history:
                    description: |-
                      History records the last 20 evolution loop executions in chronological order.
                      Oldest entries are dropped when the buffer is full.
                    items:
                      description: EvolutionHistoryEntry records a single execution
                        of the evolution loop.
                      properties:
                        at:
                          description: At is the timestamp when this evolution loop
                            execution fired.
                          format: date-time
                          type: string
                        description:
                          description: |-
                            Description is a brief human-readable summary of what the strategy did
                            (e.g., "adjusted max_latency_ms→8523.4200, min_success_rate→0.8750").
                          type: string
                        phase:
                          description: |-
                            Phase is the AgentDeployment phase that triggered the evolution loop
                            (e.g., "Degraded", "Stable"). Empty for periodic triggers.
                          type: string
                        strategy:
                          description: |-
                            Strategy is the name of the strategy that produced this entry
                            (e.g., "threshold-tuner", "prompt-optimizer", "model-upgrader").
                          type: string
                      required:
                      - at
                      - description
                      - strategy
                      type: object
                    type: array
                  lastProposal:
                    description: LastProposal is a human-readable summary of the most
                      recent evolution action.
                    type: string
                  lastProposalAt:
                    description: LastProposalAt is the time the most recent proposal
                      was generated.
                    format: date-time
                    type: string
                  nextEvalAt:
                    description: |-
                      NextEvalAt is the scheduled time for the next evolution evaluation.
                      Populated only when trigger is "periodic" or "both".
                    format: date-time
                    type: string
                  proposalCount:
                    description: ProposalCount is the total number of evolution proposals
                      generated.
                    format: int32
                    type: integer
                  tunedThresholds:
                    additionalProperties:
                      type: string
                    description: |-
                      TunedThresholds records the current adjusted threshold values produced by the
                      threshold-tuner strategy. Keys are metric names (e.g., "max_latency_ms"); values
                      are the adjusted thresholds as decimal strings (e.g., "8523.4200").
                      These are injected as env vars into the analysis Job containers on the next
                      AnalysisTemplate reconcile, replacing the hardcoded defaults.
                    type: object
                type: object
              lastAnalysisResult:
                description: LastAnalysisResult summarizes the most recent analysis
                  outcome.
                properties:
                  completedAt:
                    description: CompletedAt is when the analysis finished.
                    format: date-time
                    type: string
                  message:
                    description: Message provides human-readable details about the
                      result.
                    type: string
                  metrics:
                    additionalProperties:
                      type: string
                    description: Metrics contains the measured metric values.
                    type: object
                  status:
                    description: 'Status is the analysis result: "Successful", "Failed",
                      "Inconclusive".'
                    type: string
                required:
                - status
                type: object
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: Phase represents the current lifecycle phase.
                enum:
                - Pending
                - Progressing
                - Stable
                - Degraded
                - RollingBack
                type: string
              stableVersion:
                description: StableVersion is the currently stable (fully rolled out)
                  composite version.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
