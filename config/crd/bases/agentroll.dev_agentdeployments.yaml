                    type: string
                  modelVersion:
                    description: |-
                      ModelVersion identifies the LLM model being used (e.g., "claude-sonnet-4-20250514").
                      Model changes can dramatically alter agent behavior even with identical prompts.
                    type: string
                  promptVersion:
                    description: |-
                      PromptVersion is a Git commit ref, tag, or semantic version
                      identifying the prompt/system context version.
                      This is the most frequently changed layer.
                    type: string
                  toolDependencies:
                    description: |-
                      ToolDependencies declares MCP tool servers or other tool services
                      that this agent depends on, with version constraints.
                    items:
                      description: ToolDependency declares a dependency on an external
                        tool service.
                      properties:
                        endpoint:
                          description: Endpoint is the service endpoint if not using
                            Kubernetes service discovery.
                          type: string
                        name:
                          description: Name is the identifier of the tool service
                            (e.g., "crm-mcp-server").
                          type: string
                        version:
                          description: Version is a semver constraint (e.g., ">=1.2.0",
                            "~1.3").
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                type: object
              container:
                description: |-
                  Container defines the agent's container configuration.
                  Framework-agnostic: works with LangGraph, CrewAI, OpenAI Agents SDK, or any custom agent.
                properties:
                  args:
                    description: Args provides arguments to the entrypoint.
                    items:
                      type: string
                    type: array
                  command:
                    description: Command overrides the container entrypoint.
                    items:
                      type: string
                    type: array
                  env:
                    description: |-
                      Env defines environment variables for the agent container.
                      Typically includes LLM_PROVIDER, LLM_MODEL, API keys (via secretKeyRef), etc.
                    items:
                      description: EnvVar represents an environment variable present
                        in a Container.
                      properties:
                        name:
                          description: |-
                            Name of the environment variable.
                            May consist of any printable ASCII characters except '='.
                          type: string
                        value:
                          description: |-
                            Variable references $(VAR_NAME) are expanded
                            using the previously defined environment variables in the container and
                            any service environment variables. If a variable cannot be resolved,
                            the reference in the input string will be unchanged. Double $$ are reduced
                            to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                            "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                            Escaped references will never be expanded, regardless of whether the variable
                            exists or not.
                            Defaults to "".
                          type: string
                        valueFrom:
                          description: Source for the environment variable's value.
                            Cannot be used if value is not empty.
                          properties:
                            configMapKeyRef:
                              description: Selects a key of a ConfigMap.
                              properties:
                                key:
                                  description: The key to select.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
