---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - agentroll.agentroll.dev
  resources:
  - agentdeployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agentroll.agentroll.dev
  resources:
  - agentdeployments/finalizers
  verbs:
  - update
- apiGroups:
  - agentroll.agentroll.dev
  resources:
  - agentdeployments/status
  verbs:
  - get
  - patch
  - update
