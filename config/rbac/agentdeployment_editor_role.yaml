# This rule is not used by the project agentroll itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the agentroll.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agentroll
    app.kubernetes.io/managed-by: kustomize
  name: agentdeployment-editor-role
rules:
- apiGroups:
  - agentroll.dev
  resources:
  - agentdeployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agentroll.dev
  resources:
  - agentdeployments/status
  verbs:
  - get
