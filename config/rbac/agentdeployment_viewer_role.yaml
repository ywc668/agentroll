# This rule is not used by the project agentroll itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to agentroll.agentroll.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agentroll
    app.kubernetes.io/managed-by: kustomize
  name: agentdeployment-viewer-role
rules:
- apiGroups:
  - agentroll.agentroll.dev
  resources:
  - agentdeployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agentroll.agentroll.dev
  resources:
  - agentdeployments/status
  verbs:
  - get
