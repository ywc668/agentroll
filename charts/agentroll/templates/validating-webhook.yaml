{{- if .Values.webhook.enabled -}}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "agentroll.fullname" . }}-validating-webhook-configuration
  labels:
    {{- include "agentroll.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ include "agentroll.namespace" . }}/{{ include "agentroll.fullname" . }}-serving-cert
  {{- end }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    {{- if not .Values.webhook.certManager.enabled }}
    caBundle: {{ .Values.webhook.caBundle | default "" }}
    {{- end }}
    service:
      name: {{ include "agentroll.fullname" . }}-webhook-service
      namespace: {{ include "agentroll.namespace" . }}
      path: /validate-agentroll-dev-v1alpha1-agentdeployment
  failurePolicy: {{ .Values.webhook.failurePolicy }}
  name: vagentdeployment.kb.io
  rules:
  - apiGroups:
    - agentroll.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - agentdeployments
  sideEffects: None
{{- end }}
