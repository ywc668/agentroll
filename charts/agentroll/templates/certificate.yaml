{{- if and .Values.webhook.enabled .Values.webhook.certManager.enabled -}}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "agentroll.fullname" . }}-selfsigned-issuer
  namespace: {{ include "agentroll.namespace" . }}
  labels:
    {{- include "agentroll.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "agentroll.fullname" . }}-serving-cert
  namespace: {{ include "agentroll.namespace" . }}
  labels:
    {{- include "agentroll.labels" . | nindent 4 }}
spec:
  dnsNames:
  - {{ include "agentroll.fullname" . }}-webhook-service.{{ include "agentroll.namespace" . }}.svc
  - {{ include "agentroll.fullname" . }}-webhook-service.{{ include "agentroll.namespace" . }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ include "agentroll.fullname" . }}-selfsigned-issuer
  secretName: {{ include "agentroll.fullname" . }}-webhook-server-cert
{{- end }}
