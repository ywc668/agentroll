{{- if .Values.webhook.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentroll.fullname" . }}-webhook-service
  namespace: {{ include "agentroll.namespace" . }}
  labels:
    {{- include "agentroll.labels" . | nindent 4 }}
spec:
  ports:
  - port: 443
    protocol: TCP
    targetPort: 9443
  selector:
    control-plane: controller-manager
    {{- include "agentroll.selectorLabels" . | nindent 4 }}
{{- end }}
