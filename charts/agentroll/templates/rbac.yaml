# ClusterRole for the AgentRoll operator
# Permissions match the +kubebuilder:rbac annotations in the controller
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agentroll.fullname" . }}-manager-role
  labels:
    {{- include "agentroll.labels" . | nindent 4 }}
rules:
  # AgentDeployment CRD management
  - apiGroups: ["agentroll.dev"]
    resources: ["agentdeployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agentroll.dev"]
    resources: ["agentdeployments/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["agentroll.dev"]
    resources: ["agentdeployments/finalizers"]
    verbs: ["update"]
  # Argo Rollouts resources
  - apiGroups: ["argoproj.io"]
    resources: ["rollouts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["argoproj.io"]
    resources: ["analysistemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Kubernetes Services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leader election
  {{- if .Values.operator.leaderElection.enabled }}
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  {{- end }}
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agentroll.fullname" . }}-manager-rolebinding
  labels:
    {{- include "agentroll.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agentroll.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "agentroll.serviceAccountName" . }}
    namespace: {{ include "agentroll.namespace" . }}
