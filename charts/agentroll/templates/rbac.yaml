# ClusterRole for the AgentRoll operator.
# Permissions are kept least-privilege: only exact verbs needed per resource group.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agentroll.fullname" . }}-manager-role
  labels:
    {{- include "agentroll.labels" . | nindent 4 }}
rules:
  # ── AgentDeployment CRD ───────────────────────────────────────────────────
  - apiGroups: ["agentroll.dev"]
    resources: ["agentdeployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agentroll.dev"]
    resources: ["agentdeployments/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["agentroll.dev"]
    resources: ["agentdeployments/finalizers"]
    verbs: ["update"]

  # ── Argo Rollouts ─────────────────────────────────────────────────────────
  - apiGroups: ["argoproj.io"]
    resources: ["rollouts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["argoproj.io"]
    resources: ["analysistemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # ── Core Kubernetes resources ─────────────────────────────────────────────
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]           # OTel collector ConfigMap
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]      # per-agent SA auto-creation
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]               # Kubernetes Events (phase changes, errors)
    verbs: ["create", "patch"]

  # ── apps (read-only — stable ReplicaSet version tracking) ─────────────────
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]

  # ── KEDA (optional — graceful no-op when KEDA not installed) ──────────────
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # ── Leader election ───────────────────────────────────────────────────────
  {{- if .Values.operator.leaderElection.enabled }}
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agentroll.fullname" . }}-manager-rolebinding
  labels:
    {{- include "agentroll.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agentroll.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "agentroll.serviceAccountName" . }}
    namespace: {{ include "agentroll.namespace" . }}
