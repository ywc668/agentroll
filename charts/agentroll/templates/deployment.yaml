apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentroll.fullname" . }}-controller-manager
  namespace: {{ include "agentroll.namespace" . }}
  labels:
    control-plane: controller-manager
    {{- include "agentroll.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      control-plane: controller-manager
      {{- include "agentroll.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        control-plane: controller-manager
        {{- include "agentroll.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: {{ include "agentroll.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          command:
            - /manager
          args:
            - --health-probe-bind-address=:{{ .Values.operator.healthProbe.port }}
            {{- if .Values.operator.metrics.enabled }}
            - --metrics-bind-address=:{{ .Values.operator.metrics.port }}
            {{- else }}
            - --metrics-bind-address=0
            {{- end }}
            {{- if .Values.operator.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
            {{- end }}
          ports:
            {{- if .Values.operator.metrics.enabled }}
            - containerPort: {{ .Values.operator.metrics.port }}
              name: metrics
              protocol: TCP
            {{- end }}
            - containerPort: {{ .Values.operator.healthProbe.port }}
              name: health
              protocol: TCP
            {{- if .Values.webhook.enabled }}
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          {{- if .Values.webhook.enabled }}
          volumeMounts:
          - mountPath: /tmp/k8s-webhook-server/serving-certs
            name: webhook-cert
            readOnly: true
          {{- end }}
      {{- if .Values.webhook.enabled }}
      volumes:
      - name: webhook-cert
        secret:
          defaultMode: 420
          secretName: {{ include "agentroll.fullname" . }}-webhook-server-cert
      {{- end }}
