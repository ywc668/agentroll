name: Feature Request
description: Suggest a new capability for AgentRoll
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe it clearly so we can evaluate it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or gap that this feature would address.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Include CRD field changes, API sketches, or example YAML if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider and why did you prefer this one?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CRD / API
        - Controller / Reconciler
        - AnalysisTemplate library
        - Helm chart
        - Documentation
        - CI / Release tooling
        - Other
    validations:
      required: true
