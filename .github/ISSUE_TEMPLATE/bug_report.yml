name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Apply this AgentDeployment manifest: ...
        2. Observe this behavior: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: manifest
    attributes:
      label: AgentDeployment manifest (if applicable)
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Controller logs
      description: Output of `kubectl logs -n agentroll-system deploy/agentroll-controller-manager`
      render: text

  - type: input
    id: agentroll-version
    attributes:
      label: AgentRoll version
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes version
      placeholder: "v1.30.0"
    validations:
      required: true

  - type: input
    id: argo-version
    attributes:
      label: Argo Rollouts version
      placeholder: "v1.9.0"
