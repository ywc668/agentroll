name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write       # create GitHub Release
  packages: write       # push to ghcr.io
  id-token: write       # needed for keyless cosign signing (OIDC)

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # goreleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Helm (for chart packaging)
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HELM_REGISTRY_CONFIG: ${{ runner.temp }}/.helm/registry/config.json

      # Sign the container images with cosign (keyless via GitHub OIDC)
      - name: Sign container images
        env:
          DIGEST: ${{ steps.goreleaser.outputs.digest }}
          TAGS: ${{ steps.goreleaser.outputs.artifacts }}
        run: |
          cosign sign --yes ghcr.io/ywc668/agentroll:${{ github.ref_name }}-amd64
          cosign sign --yes ghcr.io/ywc668/agentroll:${{ github.ref_name }}-arm64
          cosign sign --yes ghcr.io/ywc668/agentroll:${{ github.ref_name }}
