name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & unit tests ────────────────────────────────────────────────────
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod tidy (verify no drift)
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: make manifests generate (verify no drift)
        run: |
          make manifests generate
          git diff --exit-code

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out
        if: always()

  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check lint config exists
        run: make lint-config

      - name: golangci-lint
        run: make lint

  # ─── Security: vulnerability scan ──────────────────────────────────────────
  govulncheck:
    name: Go vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ─── Security: container image scan ────────────────────────────────────────
  trivy:
    name: Trivy image scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload SARIF to GitHub Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t agentroll:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: agentroll:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ─── Helm chart lint ────────────────────────────────────────────────────────
  helm-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Helm lint (default values)
        run: helm lint charts/agentroll/

      - name: Helm lint (webhook enabled)
        run: helm lint charts/agentroll/ --set webhook.enabled=true

      - name: Helm template (smoke test)
        run: helm template agentroll charts/agentroll/ --set webhook.enabled=true > /dev/null
